services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ius
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ius_password}
      POSTGRES_DB: iusconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ius -d iusconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ius:${POSTGRES_PASSWORD:-ius_password}@postgres:5432/iusconnect
      REDIS_URL: redis://redis:6379
      # Secrets come from the gitignored .env file — never hardcode them here.
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      ADMIN_KEY: ${ADMIN_KEY:?set ADMIN_KEY in .env}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-student.ius.edu.ba}
      # Web Push (optional) — empty means browser push is simply disabled.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      RELOAD: "1"   # hot-reload for local dev only; production leaves this unset
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    # Local dev: hot-reload against the mounted source. The image's default CMD
    # (npm run start) is the production server used by Railway.
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      # Used by next.config.js rewrites (server-side, Docker internal network)
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
